<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus MCP - Advanced AI Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-dark: #05070a;
            --sidebar-color: rgba(13, 17, 23, 0.95);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            display: flex;
            height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Sidebar Glass Effect */
        .sidebar {
            width: 320px;
            background: var(--sidebar-color);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .sidebar-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.3);
        }

        /* Tools List Refined */
        .tools-section {
            flex: 1;
            overflow-y: auto;
        }

        .tools-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            padding-left: 5px;
        }

        .tool-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            cursor: default;
        }

        .tool-item:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .tool-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px 10%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Message Bubbles - Modern Style */
        .message {
            display: flex;
            gap: 18px;
            animation: slideUp 0.4s ease-out;
            max-width: 85%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .message.user .message-avatar {
            background: var(--gradient-primary);
            color: white;
            border: none;
        }

        .message-content {
            padding: 18px 22px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .message.user .message-content {
            background: var(--accent-blue);
            border: none;
            border-top-right-radius: 4px;
            color: white;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
        }

        .message.assistant .message-content {
            border-top-left-radius: 4px;
        }

        /* Tool Call & Result UI */
        .tool-call {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent-blue);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 13px;
        }

        .tool-result {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #34d399;
        }

        /* Input Bar - Floating Pill */
        .input-area {
            padding: 30px 10%;
            background: linear-gradient(transparent, var(--bg-dark) 40%);
        }

        .input-wrapper {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            outline: none;
            max-height: 150px;
        }

        #sendBtn {
            background: var(--gradient-primary);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #sendBtn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-blue);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent-purple);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .btn-icon:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-purple);
            transform: scale(1.05);
        }

        /* Modal for Tool Selection */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--sidebar-color);
            margin: auto;
            margin-top: 15%;
            padding: 30px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-header h2 {
            color: var(--accent-purple);
            font-size: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: var(--accent-blue);
        }

        .tool-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .tool-option {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .tool-option:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-purple);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.2);
        }

        .tool-option.connected {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .tool-option.connected:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }

        .tool-option-icon {
            font-size: 28px;
        }

        .tool-option-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: capitalize;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip" style="color: var(--accent-blue); font-size: 24px;"></i>
            <h1>Nexus MCP</h1>
        </div>
        <button class="new-chat-btn" onclick="window.location.reload()">
            <i class="fas fa-plus"></i> &nbsp; New Session
        </button>
        <div class="tools-section" id="toolsSection" style="display: none;">
            <div class="tools-title">Active Capabilities</div>
            <div id="toolsList"></div>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <button class="btn-icon" id="toolsBtn" title="Connect Tools">➕</button>
                <textarea id="input" placeholder="Enter a command..." rows="1"></textarea>
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Tool Selection Modal -->
    <div id="toolModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔧 Connect Tools</h2>
                <button class="close-modal" onclick="closeToolModal()">&times;</button>
            </div>
            <div class="tool-options" id="toolOptions"></div>
        </div>
    </div>

    <script>
        // --- BACKEND LOGIC (BILKUL SAME RAKHA HAI) ---
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const toolsBtn = document.getElementById('toolsBtn');
        const toolModal = document.getElementById('toolModal');
        const toolOptions = document.getElementById('toolOptions');
        const toolsList = document.getElementById('toolsList');
        const toolsSection = document.getElementById('toolsSection');

        let availableTools = [];
        let connectedTools = [];

        const toolIcons = {
            'get_current_time': '⏰',
            'calculate': '🧮',
            'reverse_text': '↩️',
            'count_words': '📊',
            'random_number': '🎲',
            'convert_temperature': '🌡️',
            'email_tool': '📧'
        };

        const toolDescriptions = {
            'get_current_time': 'Get current date and time',
            'calculate': 'Perform mathematical calculations',
            'reverse_text': 'Reverse any text string',
            'count_words': 'Count words in text',
            'random_number': 'Generate random numbers',
            'convert_temperature': 'Convert temperature units',
            'email_tool': 'Send emails'
        };

        const toolKeywords = {
            'get_current_time': ['what time', 'what date', 'current time', 'current date', 'what is the time'],
            'calculate': ['calculate', 'compute', '+', '-', '*', '/', 'add', 'subtract', 'multiply', 'divide', 'sum', 'total', 'equals'],
            'reverse_text': ['reverse', 'reversed'],
            'count_words': ['count words', 'word count', 'how many words'],
            'random_number': ['random', 'random number'],
            'convert_temperature': ['temperature', 'celsius', 'fahrenheit', 'convert'],
            'email_tool': ['send email', 'send mail', 'email to']
        };


        function addGreeting() {
            addMessage("Neural connection active. I am ready to process your commands. How can I assist?", "assistant");
        }

        async function loadTools() {
            try {
                const response = await fetch('/tools');
                const data = await response.json();
                availableTools = data.tools || [];
                
                if (availableTools.length > 0) {
                    toolsSection.style.display = 'block';
                    toolsList.innerHTML = availableTools.map(tool => `
                        <div class="tool-item">
                            <div class="tool-name">
                                <span>${toolIcons[tool.name] || '⚙️'}</span>
                                ${tool.name.replace(/_/g, ' ')}
                            </div>
                        </div>
                    `).join('');

                    // Populate tool modal options
                    populateToolOptions();
                }
            } catch (error) { console.error('Error loading tools:', error); }
        }

        function populateToolOptions() {
            toolOptions.innerHTML = availableTools.map(tool => {
                const isConnected = isToolConnected(tool.name);
                const connectedBadge = isConnected ? '✅ CONNECTED' : 'CLICK TO CONNECT';
                return `
                    <div class="tool-option ${isConnected ? 'connected' : ''}" onclick="connectTool('${tool.name}')">
                        <div class="tool-option-icon">${toolIcons[tool.name] || '⚙️'}</div>
                        <div class="tool-option-name">${tool.name.replace(/_/g, ' ')}</div>
                        <div style="font-size: 10px; color: ${isConnected ? '#10b981' : '#94a3b8'}; margin-top: 4px;">
                            ${connectedBadge}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openToolModal() {
            toolModal.style.display = 'block';
        }

        function closeToolModal() {
            toolModal.style.display = 'none';
        }

        function connectTool(toolName) {
            if (!connectedTools.includes(toolName)) {
                connectedTools.push(toolName);
                closeToolModal();
                
                // Show confirmation message
                const toolIcon = toolIcons[toolName] || '⚙️';
                const toolDisplayName = toolName.replace(/_/g, ' ');
                addMessage(
                    `${toolIcon} "${toolDisplayName.toUpperCase()}" tool connected successfully. Will auto-trigger when relevant.`,
                    'assistant'
                );
                
                // Update tool modal to show connected status
                populateToolOptions();
            }
        }

        function disconnectTool(toolName) {
            connectedTools = connectedTools.filter(t => t !== toolName);
            populateToolOptions();
        }

        function isToolConnected(toolName) {
            return connectedTools.includes(toolName);
        }

        function detectToolFromMessage(message) {
            const messageLower = message.toLowerCase().trim();
            // Only detect tool if it's one of the connected tools
            for (const tool of connectedTools) {
                if (toolKeywords[tool]) {
                    for (const keyword of toolKeywords[tool]) {
                        // Exact match or word boundary match
                        const regex = new RegExp('\\b' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
                        if (regex.test(messageLower)) {
                            return tool;
                        }
                    }
                }
            }
            return null;
        }

        // Click on plus button to open modal
        toolsBtn.addEventListener('click', openToolModal);

        // Close modal when clicking outside
        window.addEventListener('click', (event) => {
            if (event.target === toolModal) {
                closeToolModal();
            }
        });

        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = Math.min(inputField.scrollHeight, 150) + 'px';
        });

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function addMessage(text, role, isError = false) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            msg.appendChild(avatar);
            msg.appendChild(content);
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addToolCall(toolName, args) {
            const content = document.createElement('div');
            content.className = 'message assistant';
            content.innerHTML = `
                <div class="message-avatar">🔧</div>
                <div class="message-content">
                    <div class="tool-call">
                        <strong>Executing:</strong> ${toolName}<br>
                        <small>Args: ${JSON.stringify(args)}</small>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(content);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addToolResult(result) {
            const content = document.createElement('div');
            content.className = 'message assistant';
            content.innerHTML = `
                <div class="message-avatar">✅</div>
                <div class="message-content">
                    <div class="tool-result">${result}</div>
                </div>
            `;
            messagesDiv.appendChild(content);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            inputField.value = '';
            inputField.style.height = 'auto';
            sendBtn.disabled = true;

            try {
                // Detect which tool to use from message
                let detectedTool = detectToolFromMessage(message);
                
                // If a tool was detected in connected tools, show it
                if (detectedTool && isToolConnected(detectedTool)) {
                    addToolCall(detectedTool, {});
                }
                
                // Always send the full list of connected tools to backend for enforcement
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message,
                        connected_tools: connectedTools
                    })
                });

                const data = await response.json();
                if (data.tool_call) addToolCall(data.tool_call.tool, data.tool_call.arguments);
                if (data.tool_result) addToolResult(data.tool_result);
                if (data.final_answer) addMessage(data.final_answer, 'assistant');
            } catch (error) {
                addMessage(`Error: ${error.message}`, 'assistant', true);
            } finally {
                sendBtn.disabled = false;
            }
        }

        addGreeting();
        loadTools();
    </script>
</body>
</html>
