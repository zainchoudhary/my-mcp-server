<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Agent - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #fff;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #f7f7f7;
            border-right: 1px solid #d1d5db;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .new-chat-btn {
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #f7f7f7;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .user .message-avatar {
            background: #10a37f;
        }

        .assistant .message-avatar {
            background: #6366f1;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .user .message-content {
            background: #10a37f;
            color: white;
        }

        .assistant .message-content {
            background: #f7f7f7;
            color: #333;
        }

        .tool-call {
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            padding: 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 13px;
        }

        .tool-call-name {
            font-weight: 600;
            color: #0284c7;
        }

        .tool-result {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            padding: 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 13px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #d1d5db;
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        .input-field {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: #10a37f;
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
        }

        .send-btn {
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #0d8d6f;
        }

        .send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .loading span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6366f1;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }

        .status {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <button class="new-chat-btn">+ New Chat</button>
        <div style="flex: 1;"></div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="status" id="status"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    class="input-field" 
                    id="input" 
                    placeholder="Tell me anything... Ask for current time, calculate something, send email, etc."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        // Auto-resize textarea
        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
        });

        // Send message on Enter (Ctrl+Enter for new line)
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            inputField.value = '';
            inputField.style.height = 'auto';
            sendBtn.disabled = true;

            try {
                // Send to backend
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // Display tool call if exists
                if (data.tool_call) {
                    addToolCall(data.tool_call.tool, data.tool_call.arguments);
                }

                // Display tool result if exists
                if (data.tool_result) {
                    addToolResult(data.tool_result);
                }

                // Display final answer
                if (data.final_answer) {
                    addMessage(data.final_answer, 'assistant');
                }
            } catch (error) {
                addMessage(`Error: ${error.message}`, 'assistant', true);
            } finally {
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        function addMessage(text, role, isError = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'You' : 'AI';

            const content = document.createElement('div');
            content.className = 'message-content';
            if (isError) {
                content.className += ' error';
            }
            content.textContent = text;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(content);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addToolCall(toolName, args) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'AI';

            const content = document.createElement('div');
            content.className = 'message-content tool-call';
            content.innerHTML = `
                <div class="tool-call-name">🔧 Calling: ${toolName}</div>
                <div style="margin-top: 4px; opacity: 0.7;">${JSON.stringify(args, null, 2)}</div>
            `;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(content);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addToolResult(result) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'AI';

            const content = document.createElement('div');
            content.className = 'message-content tool-result';
            content.innerHTML = `
                <div style="font-weight: 600;">✅ Tool Result</div>
                <div style="margin-top: 4px;">${result}</div>
            `;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(content);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Initial greeting
        addMessage('👋 Hi! I\'m your MCP AI Assistant. I can help you with:\n\n• Check current date/time\n• Calculate math expressions\n• Reverse text\n• Count words\n• Generate random numbers\n• Convert temperatures\n• Send emails\n\nWhat would you like to do?', 'assistant');
    </script>
</body>
</html>
